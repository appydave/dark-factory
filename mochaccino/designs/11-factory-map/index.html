  .track-card.st-progressing { border-left-color: var(--s-progressing); }

  .track-card.st-gap         { border-left-color: var(--s-gap); }

     "kdd": "docs/constellation-map.md"}
  ],
  "next": "Out of the moratorium (ADR-0045): with the whole factory now visible, choose the next PIPELINE — not '1,100 skills' by default. Candidates the map surfaces: harden HITL (unblocks ratification at scale), stand up Watchtower (permanent visibility), or build the Producer (T2, so the factory feeds itself)."
}
</script>

<script>
(function () {
  'use strict';
  var DATA = JSON.parse(document.getElementById('factory-map-data').textContent);
  function esc(s){ if(s===null||s===undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Header ──
  document.getElementById('subtitle').innerHTML = esc(DATA._meta.subtitle);
  document.getElementById('as-of').textContent = 'as of ' + DATA._meta.as_of;

  // ── Legend ──
  var legendHtml = '';
  DATA.status_legend.forEach(function(l){
    legendHtml += '<div class="legend-item lg-' + esc(l.key) + '">' +
      '<span class="legend-swatch"></span>' +
      '<span class="lg-label">' + esc(l.label) + '</span>' +
      '<span class="lg-note">— ' + esc(l.note) + '</span></div>';
  });
  document.getElementById('legend').innerHTML = legendHtml;

  var legendLabel = {};
  DATA.status_legend.forEach(function(l){ legendLabel[l.key] = l.label; });

  // ── Status board ──
  var tHtml = '';
  DATA.tracks.forEach(function(t){
    var total = (t.done||0) + (t.ready||0) + (t.blocked||0);
    var pct = function(n){ return total > 0 ? (100 * n / total) : 0; };
    var dim = (t.done === 0) ? ' dim' : '';
    tHtml += '<div class="track-card st-' + esc(t.status) + dim + '">';
    tHtml += '<div class="tc-head"><span class="tc-id">' + esc(t.id) + '</span>' +
             '<span class="tc-name">' + esc(t.name) + '</span>' +
             '<span class="tc-chip st-' + esc(t.status) + '">' + esc(legendLabel[t.status] || t.status) + '</span></div>';
    tHtml += '<div class="tc-purpose">' + esc(t.purpose) + '</div>';

    // rollup
    tHtml += '<div class="rollup"><div class="rollup-bar">';
    if (t.done)    tHtml += '<div class="seg-done" style="width:' + pct(t.done) + '%"></div>';
    if (t.ready)   tHtml += '<div class="seg-ready" style="width:' + pct(t.ready) + '%"></div>';
    if (t.blocked) tHtml += '<div class="seg-blocked" style="width:' + pct(t.blocked) + '%"></div>';
    tHtml += '</div><div class="rollup-pills">' +
      '<span class="pill p-done"><span class="dot"></span><b>' + t.done + '</b> done</span>' +
      '<span class="pill p-ready"><span class="dot"></span><b>' + t.ready + '</b> ready</span>' +
      '<span class="pill p-blocked"><span class="dot"></span><b>' + t.blocked + '</b> blocked</span>' +
      '</div></div>';

    tHtml += '<div class="tc-note">' + esc(t.note) + '</div>';

    // gap markers
    if (t.gaps && t.gaps.length) {
      tHtml += '<div class="tc-gaps">';
      t.gaps.forEach(function(g){
        tHtml += '<div class="gap-marker"><span class="gm-x">✕</span><span class="gm-text">' + esc(g) + '</span></div>';
      });
      tHtml += '</div>';
    } else {
      tHtml += '<div class="tc-nogaps">✓ no open gaps</div>';
    }
    tHtml += '</div>';
  });
  document.getElementById('track-grid').innerHTML = tHtml;

  // ── Architecture ──
  document.getElementById('arch-note').innerHTML = esc(DATA.architecture.note);
  function stateClass(s){ return 'a-' + String(s).replace(/[^a-z]/gi,'').toLowerCase(); }
  var aHtml = '';
  var layers = DATA.architecture.layers;
  layers.forEach(function(layer, i){
    aHtml += '<div class="arch-band">' +
      '<div class="arch-band-head"><span class="arch-band-name">' + esc(layer.name) + '</span>' +
      '<span class="arch-band-role">' + esc(layer.role) + '</span></div>' +
      '<div class="arch-band-body">';
    layer.components.forEach(function(c){
      var sc = stateClass(c.state);
      aHtml += '<div class="arch-chip ' + sc + '">' +
        '<div class="ac-name">' + esc(c.name) + '<span class="ac-state ' + sc + '">' + esc(c.state) + '</span></div>' +
        (c.note ? '<div class="ac-note">' + esc(c.note) + '</div>' : '') +
        '</div>';
    });
    aHtml += '</div></div>';
    // connector to the layer below
    if (i < layers.length - 1) {
      var rel = (layer.id === 'host') ? 'surfaces mount on host'
              : (layer.id === 'surfaces') ? 'data feeds surfaces' : '';
      aHtml += '<div class="arch-link"><span class="glyph">&#8595;</span><span class="txt">' + esc(rel) + '</span></div>';
    }
  });
  document.getElementById('arch-stack').innerHTML = aHtml;

  // ── Gaps board ──
  var gHtml = '';
  DATA.gaps_board.forEach(function(g){
    gHtml += '<div class="gap-card">';
    gHtml += '<div class="gc-head"><span class="gc-sev sev-' + esc(g.severity) + '">' + esc(g.severity) + '</span>' +
             '<span class="gc-title">' + esc(g.title) + '</span>' +
             '<span class="gc-tracks">' + g.tracks.map(function(t){ return '<span class="gc-track-tag">' + esc(t) + '</span>'; }).join('') + '</span></div>';
    gHtml += '<div class="gc-detail">' + esc(g.detail) + '</div>';
    gHtml += '<span class="gc-kdd"><span class="kdd-key">kdd:</span> ' + esc(g.kdd) + '</span>';
    gHtml += '</div>';
  });
  document.getElementById('gaps-grid').innerHTML = gHtml;

  // ── Footer ──
  document.getElementById('footer').innerHTML =
    '<div class="next-line"><b>What this tells us →</b> ' + esc(DATA.next) + '</div>' +
    'Design 11 · Factory Map · Dark Factory · AppyDave · data: mochaccino/data/factory-map.json · ' +
    'supersedes 01-pipeline-overview' +
    '<span class="src">source: ' + esc(DATA._meta.source) + '</span>';
})();
</script>

<script>window.COPYKIT_CONFIG = { blocks: ".track-card,.gap-card,.arch-chip", title: "Dark Factory — Factory Map" };</script>
<script src="../components/copykit.js"></script>
</body>
</html>
